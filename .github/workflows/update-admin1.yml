name: Update admin-1 boundaries

on:
  schedule:
    - cron: '0 3 * * 0'   # 03:00 UTC every Sunday
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  update-admin1:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TopoJSON tools
        run: npm install topojson-server topojson-simplify

      - name: Fetch and convert admin-1 boundaries
        run: node scripts/fetch-admin1.js

      - name: Commit and push if data changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/admin1.json
          git diff --staged --quiet \
            && echo 'No changes — skipping commit' \
            || git commit -m "chore: update admin-1 boundaries ($(date -u +%Y-%m-%d))"
          git push
