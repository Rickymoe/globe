name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy directory
        env:
          AIS_KEY: ${{ secrets.AIS_API_KEY }}
        run: |
          cp -r . /tmp/deploy
          echo "{\"aisApiKey\":\"$AIS_KEY\"}" > /tmp/deploy/data/config.json

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/deploy
          exclude_assets: '.github,scripts,node_modules,.gitignore'
